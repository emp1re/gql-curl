# graphql.curl.yaml
schema: "./example/gql/"  # Path to your GraphQL schema files
output: "./generated_curls" # Directory where the generated cURL commands will be saved
endpoint: "http://localhost:8080/graphql" # GraphQL endpoint URL
environment:
  GQL_AUTH_TOKEN: ${TOKEN_KEY} # Environment variable key for the Bearer token, which will be loaded from the .env file
headers:
  Authorization: "Bearer {{environment.GQL_AUTH_TOKEN}}" # Use the token from environment variables in the Authorization header
  Content-Type: "application/json" # Set the Content-Type header to application/json